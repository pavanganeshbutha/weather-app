<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>Weather App</title>
  </head>
  <body>
    <header><h1>Weather App</h1></header>
    <form role="search">
      <input
        type="text"
        id="city-input"
        placeholder="Enter city name"
        aria-label="Search for a city"
      />
      <button type="submit">Get Weather</button>
    </form>
    <main>
      <section id="current-weather"></section>
      <section id="weather-forecast"></section>
    </main>
    <footer>
      <div class="footer-container">
        <p>
          &copy; <span id="year"></span> Pavan Ganesh Butha. All rights
          reserved.
        </p>
        <div class="social-links">
          <a
            href="https://github.com/pavanganeshbutha"
            target="_blank"
            rel="noopener noreferrer"
            >GitHub</a
          >
          <a
            href="https://www.linkedin.com/in/pavan-ganesh-butha-15204a1b2/"
            target="_blank"
            rel="noopener noreferrer"
            >LinkedIn</a
          >
        </div>
      </div>
    </footer>
    <script src="scripts/app.js"></script>
  </body>
</html>
